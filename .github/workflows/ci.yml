name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  generation-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "latest"
          python-version: "3.14"
          enable-cache: true

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure git (required by copier tasks)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"

      - name: Sync dependencies
        run: uv sync

      - name: Run generation test suite
        run: uv run pytest -v
